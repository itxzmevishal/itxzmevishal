name: Update Space Shooter Game

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Generate Game
        uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          username: itxzmevishal
          output-path: 'game.gif'
          strategy: 'random'
          fps: 35

      - name: Commit and Push
        run: |
          git config --global user.name "itxzmevishal"
          git config --global user.email "you@example.com"
          git add game.gif
          git commit -m "update game gif" || echo "no changes"
          git push
